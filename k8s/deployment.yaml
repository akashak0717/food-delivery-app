apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-delivery-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: food-delivery-app
  template:
    metadata:
      labels:
        app: food-delivery-app
    spec:
      containers:
      - name: food-delivery-app
        image: food-delivery-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80